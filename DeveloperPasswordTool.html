<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Developer Password Tool</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --panel: #ffffff;
      --line: #ded8cf;
      --text: #1f2933;
      --muted: #667085;
      --accent: #6a8f5f;
      --accent-2: #2f5f54;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at top left, #efe8dc 0, transparent 32rem), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      width: min(940px, 100%);
      display: grid;
      gap: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      color: var(--accent-2);
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    section {
      background: rgba(255, 255, 255, .86);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 18px 44px rgba(31, 41, 51, .08);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(106, 143, 95, .16);
    }
    textarea {
      min-height: 132px;
      direction: ltr;
      text-align: left;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 13px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--accent-2);
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: var(--accent); }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .status {
      margin-top: 10px;
      min-height: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent-2); }
    .plain {
      margin-top: 10px;
      padding: 12px;
      border: 1px dashed var(--accent);
      border-radius: 8px;
      background: #f4f8f1;
      direction: ltr;
      text-align: left;
      font-family: Consolas, monospace;
      min-height: 46px;
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>أداة تشفير كلمة مرور المطور</h1>
      <p>تستخدم نفس صيغة التشفير التي يقرأها البرنامج: AES-GCM، والمفتاح مدمج داخل البرنامج وهذه الصفحة.</p>
    </section>

    <section>
      <h2>1. تشفير الباسورد وتجهيز JSON</h2>
      <div class="grid">
        <input id="passwordInput" type="password" placeholder="اكتب باسورد المطور الحقيقي">
        <button id="encryptBtn">تشفير</button>
      </div>
      <textarea id="jsonOutput" readonly placeholder="سيظهر JSON هنا"></textarea>
      <div class="row">
        <button id="copyJsonBtn" class="secondary">نسخ JSON</button>
      </div>
      <div id="encryptStatus" class="status"></div>
    </section>

    <section>
      <h2>2. قراءة info.json من اللينك وفك الباسورد</h2>
      <div class="grid">
        <input id="jsonUrl" value="https://raw.githubusercontent.com/Juba-Juba/052032/refs/heads/main/info.json">
        <button id="readBtn">قراءة وفك</button>
      </div>
      <div id="plainPassword" class="plain"></div>
      <div id="readStatus" class="status"></div>
    </section>
  </main>

  <script>
    const KEY_TEXT = "PriceScanner.DeveloperPassword.LinkKey.v1";

    const $ = (id) => document.getElementById(id);
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    function toBase64(bytes) {
      let binary = "";
      bytes.forEach((b) => binary += String.fromCharCode(b));
      return btoa(binary);
    }

    function fromBase64(text) {
      const binary = atob(text);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function getKey() {
      const hash = await crypto.subtle.digest("SHA-256", enc.encode(KEY_TEXT));
      return crypto.subtle.importKey("raw", hash, "AES-GCM", false, ["encrypt", "decrypt"]);
    }

    async function encryptPassword(password) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await getKey();
      const cipher = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(password)));
      return `psenc.v1.${toBase64(iv)}.${toBase64(cipher)}`;
    }

    async function decryptPassword(value) {
      if (typeof value === "string") {
        const parts = value.split(".");
        if (parts.length !== 4 || parts[0] !== "psenc" || parts[1] !== "v1") return null;
        const iv = fromBase64(parts[2]);
        const cipher = fromBase64(parts[3]);
        const key = await getKey();
        const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
        return dec.decode(plain);
      }

      if (value && typeof value === "object") {
        const ivText = value.iv || value.nonce;
        const cipherText = value.value || value.data || value.cipher || value.ciphertext;
        if (!ivText || !cipherText) return null;
        const key = await getKey();
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: fromBase64(ivText) },
          key,
          fromBase64(cipherText)
        );
        return dec.decode(plain);
      }

      return null;
    }

    async function findEncryptedPassword(node) {
      if (!node || typeof node !== "object") return null;
      for (const [key, value] of Object.entries(node)) {
        const normalized = key.replace(/[_-]/g, "").toLowerCase();
        if ([
          "developerpasswordencrypted",
          "developerpasswordcipher",
          "masterpasswordencrypted",
          "devpasswordencrypted",
          "developerpasswordhash"
        ].includes(normalized)) {
          const plain = await decryptPassword(value);
          if (plain) return plain;
        }
        const nested = await findEncryptedPassword(value);
        if (nested) return nested;
      }
      return null;
    }

    $("encryptBtn").addEventListener("click", async () => {
      const status = $("encryptStatus");
      status.className = "status";
      try {
        const password = $("passwordInput").value;
        if (!password) throw new Error("اكتب الباسورد الأول.");
        const encrypted = await encryptPassword(password);
        $("jsonOutput").value = JSON.stringify({ developerPasswordEncrypted: encrypted }, null, 2);
        status.textContent = "تم التشفير. ارفع JSON الناتج في info.json.";
        status.classList.add("ok");
      } catch (err) {
        status.textContent = err.message || "تعذر التشفير.";
        status.classList.add("error");
      }
    });

    $("copyJsonBtn").addEventListener("click", async () => {
      if (!$("jsonOutput").value) return;
      await navigator.clipboard.writeText($("jsonOutput").value);
      $("encryptStatus").textContent = "تم نسخ JSON.";
      $("encryptStatus").className = "status ok";
    });

    $("readBtn").addEventListener("click", async () => {
      const status = $("readStatus");
      status.className = "status";
      $("plainPassword").textContent = "";
      try {
        const res = await fetch($("jsonUrl").value, { cache: "no-store" });
        if (!res.ok) throw new Error(`فشل تحميل الملف: ${res.status}`);
        const json = await res.json();
        const plain = await findEncryptedPassword(json);
        if (!plain) throw new Error("لم يتم العثور على باسورد مشفر قابل للفك.");
        $("plainPassword").textContent = plain;
        status.textContent = "تم فك التشفير بنجاح.";
        status.classList.add("ok");
      } catch (err) {
        status.textContent = err.message || "تعذر قراءة أو فك الملف.";
        status.classList.add("error");
      }
    });
  </script>
</body>
</html>
